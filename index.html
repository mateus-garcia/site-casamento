<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Luísa & Mateus</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600&family=Great+Vibes&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Playfair Display', serif;
            background: #f5f4f2;
        }

        .monogram {
            font-family: 'Great Vibes', cursive;
        }

        html {
            scroll-behavior: smooth;
        }
    </style>

</head>

<script>

    const weddingDate = new Date("2026-10-03T16:00:00-03:00");

    function updateCountdown() {

        const now = new Date();
        const diff = weddingDate - now;

        if (diff <= 0) {
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById("days").innerText = days;
        document.getElementById("hours").innerText = hours;
        document.getElementById("minutes").innerText = minutes;
        document.getElementById("seconds").innerText = seconds;
    }

    setInterval(updateCountdown, 1000);

    updateCountdown();

</script>

<body class="flex items-center justify-center min-h-screen text-gray-700">

    <nav class="fixed top-0 left-0 w-full bg-white/80 backdrop-blur-sm border-b border-gray-200">
        <div
            class="max-w-5xl mx-auto px-6 py-4 flex justify-center gap-8 text-sm tracking-[0.25em] uppercase text-gray-600">

            <a href="#inicio" class="hover:text-black">Início</a>
            <a href="#local" class="hover:text-black">Local</a>
            <a href="#contato" class="hover:text-black">Contato</a>
            <a href="#rsvp" class="hover:text-black">RSVP</a>

        </div>
    </nav>

    <!-- <section id="inicio" class="flex items-center justify-center min-h-screen text-gray-700 pt-24"> -->
    <div class="text-center max-w-2xl px-6" id="inicio">

        <p class="tracking-[0.4em] text-sm mb-10 mt-8 text-gray-500">
            SAVE THE DATE
        </p>

        </p>

        <div class="flex justify-center gap-8 text-center mb-6">

            <div>
                <div id="days" class="text-3xl font-light">0</div>
                <div class="text-xs tracking-[0.3em] text-gray-500">Dias</div>
            </div>

            <div>
                <div id="hours" class="text-3xl font-light">0</div>
                <div class="text-xs tracking-[0.3em] text-gray-500">Horas</div>
            </div>

            <div>
                <div id="minutes" class="text-3xl font-light">0</div>
                <div class="text-xs tracking-[0.3em] text-gray-500">Minutos</div>
            </div>

            <div>
                <div id="seconds" class="text-3xl font-light">0</div>
                <div class="text-xs tracking-[0.3em] text-gray-500">Segundos</div>
            </div>

        </div>

        <p class="tracking-[0.3em] text-gray-500">
            Canela — RS
        </p>

        <section id="local" class="py-24 text-center">
        
            <h2 class="text-3xl mb-6">Local</h2>
            
            <p class="text-gray-700 text-lg">
                Grande Hotel Canela
            </p>
            
            <p class="text-gray-500 mb-10">
                Canela – RS
            </p>
            
            <div class="max-w-3xl mx-auto rounded-xl overflow-hidden shadow-lg">
            
                <iframe src="https://www.google.com/maps?q=Grande+Hotel+Canela&output=embed" width="90%" height="150"
                    style="border:0;" allowfullscreen="" loading="lazy">

            </div>
            
            <p class="mt-6">
                <a href="https://maps.app.goo.gl/hFyo8bNJKKq65J5t6" target="_blank"

        <section id="contato">

                </a>
            </p>
        
        </section>

        <section id="rsvp" class="py-24 text-center">

            <p class="text-gray-600">
                Confirme sua presença.
            </p>

                Confirmar presença
            </button>
        
        </section>

    </div>

</body>

</html>
