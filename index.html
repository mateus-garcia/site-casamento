<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Luísa & Mateus</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600&family=Great+Vibes&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Playfair Display', serif;
            background: #f5f4f2;
        }

        .monogram {
            font-family: 'Great Vibes', cursive;
        }
    </style>

</head>

<script>

    const weddingDate = new Date("2026-10-03T16:00:00-03:00");

    function updateCountdown() {

        const now = new Date();
        const diff = weddingDate - now;

        if (diff <= 0) {
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById("days").innerText = days;
        document.getElementById("hours").innerText = hours;
        document.getElementById("minutes").innerText = minutes;
        document.getElementById("seconds").innerText = seconds;
    }

    setInterval(updateCountdown, 1000);

    updateCountdown();

</script>

<body class="flex items-center justify-center min-h-screen text-gray-700">

    <div class="text-center max-w-2xl px-6">

        <p class="tracking-[0.4em] text-sm mb-10 text-gray-500">
            SAVE THE DATE
        </p>

        <h1 class="monogram text-[120px] md:text-[160px] text-gray-600 leading-none mb-6">
            LM
        </h1>

        <p class="uppercase tracking-[0.35em] text-sm mb-12">
            Luísa & Mateus
        </p>

        <p class="text-2xl tracking-[0.3em] mb-6">
            03 · 10 · 2026
        </p>

        <div class="flex justify-center gap-8 text-center mb-6">
        
            <div>
                <div id="days" class="text-3xl font-light">0</div>
                <div class="text-xs tracking-[0.3em] text-gray-500">Dias</div>
            </div>
        
            <div>
                <div id="hours" class="text-3xl font-light">0</div>
                <div class="text-xs tracking-[0.3em] text-gray-500">Horas</div>
            </div>
        
            <div>
                <div id="minutes" class="text-3xl font-light">0</div>
                <div class="text-xs tracking-[0.3em] text-gray-500">Minutos</div>
            </div>
        
            <div>
                <div id="seconds" class="text-3xl font-light">0</div>
                <div class="text-xs tracking-[0.3em] text-gray-500">Segundos</div>
            </div>
        
        </div>

        <p class="tracking-[0.3em] text-gray-500">
            Canela — RS
        </p>

    </div>

</body>

</html>
